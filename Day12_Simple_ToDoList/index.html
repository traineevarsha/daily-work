<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <h2>Daily Todo List</h2>
    <input type="text" onkeyup="validate()" id="todo-input" placeholder="Enter task">
    <input type ="time" id="todo-time-input" placeholder="Enter time">
    <input type="number" onkeyup="validateHours()" id="todo-hours-input" placeholder="Enter how long it'll take in hours">
    <label for ="priority" > Choose a task priority</label>
    <select name="priority" id="priority">
    <option value="">Select a priority </option>
    <option value="high priority">High Priority</option>
    <option value="normal priority">Normal Priority</option>
    <option value="low priority">Low Priority</option>
    </select>
    <div class="button-row">
            <button class="sort-button" onclick="sortByName()">Sort</button>
            <button class="add-button" onclick="addTodo()">Add</button>
    </div>
    <div class = "error" id= "error"> Name is mandatory to enter </div>
    <div class="error" id="error-hours"> Hours cannot be negative </div>
    
    <ul id="todo-list"></ul>
</div>
<script src ="ToDoList.js"></script>
</body>
</html>
